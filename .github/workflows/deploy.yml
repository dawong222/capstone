name: Deploy Spring Boot

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v3

      - name: Java 설정
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'

      - name: 빌드
        run: |
          chmod +x gradlew
          ./gradlew clean build -x test

      # 🔥 기존 jar 삭제 (중요)
      - name: 서버 정리
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            echo "기존 jar 삭제"
            rm -f /home/ubuntu/app.jar

      # 🔥 jar 전송 (이름 고정)
      - name: EC2로 jar 전송
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: "build/libs/app.jar"
          target: "/home/ubuntu/"

      # 🔥 서버 실행
      - name: 서버 실행
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            echo "기존 서버 종료"
            pkill -f app.jar || true

            echo "실행"
            nohup java -jar /home/ubuntu/app.jar > /home/ubuntu/app.log 2>&1 &