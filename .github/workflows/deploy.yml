name: Deploy Spring Boot

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 코드 가져오기
      - name: Checkout
        uses: actions/checkout@v3

      # 2. Java 설정
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'

      # 3. 빌드
      - name: Build
        run: |
          chmod +x gradlew
          ./gradlew clean build -x test

      # 🔥 빌드 결과 확인 (디버깅용 유지)
      - name: Check build result
        run: ls -l build/libs

      # 4. 서버 정리 (기존 프로세스 + jar 제거)
      - name: Clean server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            echo "기존 서버 종료"
            pkill -f java || true

            echo "기존 jar 삭제"
            rm -f /home/ubuntu/*.jar

      # 5. jar 전송
      - name: Upload jar to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: "build/libs/*.jar"
          target: "/home/ubuntu/"

      # 6. 서버 실행 (최신 파일 실행)
      - name: Run server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            echo "실행할 jar 찾기"
            JAR=$(ls -t /home/ubuntu/*.jar | grep -v plain.jar | head -n 1)

            echo "실행 파일: $JAR"

            echo "서버 실행"
            nohup java -jar $JAR > /home/ubuntu/app.log 2>&1 &