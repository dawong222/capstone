# dev.yml
name: dev branch auto ci process script

on: # 아래 job을 실행시킬 상황
  push:
    branches: [ main ]

jobs:
  deploy:
    name: deploy
    runs-on: ubuntu-latest # 실행될 인스턴스 OS와 버전

    steps:
      - name: excuting remote ssh commands
        uses: appleboy/ssh-action@v0.1.6 # ssh 접속하는 오픈소스
        with:
          host: ${{ secrets.EC2_HOST }} # 인스턴스 IP
          username: ${{ secrets.EC2_USER }} # 우분투 아이디
          key: ${{ secrets.EC2_KEY }} # ec2 instance pem key
          port: 22 # 접속포트
          script: | # 실행할 스크립트
            cd /home/ubuntu/Server-V2
  
            git pull origin dev
  
            chmod +x gradlew
            ./gradlew build -x test
  
            pkill -f java || true
  
            JAR=$(ls build/libs/*SNAPSHOT.jar | head -n 1)
  
            nohup java -jar $JAR > app.log 2>&1 &