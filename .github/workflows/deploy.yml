name: Docker CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 코드 가져오기
      - name: Checkout
        uses: actions/checkout@v4

      # 2. JDK
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. build
      - name: Build
        run: |
          chmod +x gradlew
          ./gradlew build -x test

      # 4. Docker 이미지 생성
      - name: Build Docker image
        run: docker build -t capstone-app .

      # 5. 이미지 저장
      - name: Save Docker image
        run: docker save capstone-app > capstone-app.tar

      # 6. EC2로 전송
      - name: Copy to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          source: capstone-app.tar
          target: /home/ubuntu/

      # 7. EC2에서 실행
      - name: Deploy on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker load < capstone-app.tar

            docker stop capstone || true
            docker rm capstone || true

            docker run -d -p 8080:8080 --name capstone capstone-app