name: Docker CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 코드 가져오기
      - name: Checkout
        uses: actions/checkout@v4

      # 2. JDK
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. build (clean으로 캐시 무력화)
      - name: Build
        run: |
          chmod +x gradlew
          ./gradlew clean build -x test

      # 3.5. JAR 검증
      - name: Verify JAR
        run: |
          echo "=== build/libs 내용 ==="
          ls -lh build/libs/
          echo "=== DemoController 포함 여부 ==="
          jar tf build/libs/app.jar | grep Demo
          echo "=== controller 클래스 목록 ==="
          jar tf build/libs/app.jar | grep controller

      # 4. Docker 이미지 생성
      - name: Build Docker image
        run: docker build -t capstone-app .

      # 5. 이미지 저장
      - name: Save Docker image
        run: docker save capstone-app > capstone-app.tar

      # 6. EC2로 전송
      - name: Copy to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          source: capstone-app.tar
          target: /home/ubuntu/

      # 7. EC2에서 실행
      - name: Deploy on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker stop capstone || true
            docker rm capstone || true

            docker rmi capstone-app || true

            docker load < /home/ubuntu/capstone-app.tar

            docker run -d -p 8080:8080 --name capstone capstone-app

            rm -f /home/ubuntu/capstone-app.tar
            docker image prune -f
