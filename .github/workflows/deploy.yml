name: Deploy Spring Boot

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v3

      - name: Java 설정
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'

      - name: 빌드
        run: |
          chmod +x gradlew
          ./gradlew build -x test

      - name: EC2로 jar 전송
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: "build/libs/*.jar"
          target: "/home/ubuntu/"

      - name: 서버에서 실행
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            echo "기존 서버 종료"
            pkill -f java || true

            echo "jar 확인"
            ls /home/ubuntu

            JAR=$(ls /home/ubuntu/*.jar | head -n 1)
            echo "실행 파일: $JAR"

            echo "서버 실행"
            nohup java -jar $JAR > app.log 2>&1 &