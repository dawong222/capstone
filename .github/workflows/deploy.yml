name: Deploy Spring Boot

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 코드 가져오기
      - name: Checkout
        uses: actions/checkout@v3

      # 2️⃣ Java 환경 설정
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'

      # 3️⃣ 빌드
      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew clean build -x test

      # 🔥 (중요) 빌드 결과 확인
      - name: Check build result
        run: ls -l build/libs

      # 4️⃣ jar 이름 고정 (공식 예시 방식)
      - name: Rename jar
        run: |
          JAR_NAME=$(ls build/libs/*.jar | grep -v plain.jar)
          mv $JAR_NAME build/libs/app.jar

      # 5️⃣ EC2 기존 프로세스 종료 + jar 삭제
      - name: Clean server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            echo "서버 종료"
            pkill -f app.jar || true

            echo "기존 jar 삭제"
            rm -f /home/ubuntu/app.jar

      # 6️⃣ jar 전송
      - name: Upload jar to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: "build/libs/app.jar"
          target: "/home/ubuntu/"

      # 7️⃣ 서버 실행
      - name: Run server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            echo "서버 실행"
            nohup java -jar /home/ubuntu/app.jar > /home/ubuntu/app.log 2>&1 &